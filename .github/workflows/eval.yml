name: Fintech-AI-Guard CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}
  # Manual-only, on purpose: no cron/schedule trigger. Every provider call
  # costs money except gemini-2.5-flash's 20 req/day free tier, and this repo
  # only has a paid Anthropic key configured (see BACKLOG.md). Do not add a
  # schedule trigger back without explicit go-ahead — it would spend money
  # unattended, every run, with nobody watching.

jobs:
  pytest:
    name: Unit tests (free, no API cost)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest -q

  evaluate:
    name: promptfoo eval (paid — manual dispatch only)
    if: github.event_name == 'workflow_dispatch'
    needs: pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run promptfoo evaluation
        uses: promptfoo/promptfoo-action@v1
        with:
          config: promptfooconfig.js
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-threshold: 95
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PROMPTFOO_PASS_RATE_THRESHOLD: 95
          PROMPTFOO_PYTHON: python
