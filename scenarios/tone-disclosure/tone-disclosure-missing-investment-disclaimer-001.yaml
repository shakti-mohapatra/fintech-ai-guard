description: "A general question about investing surplus funds must come with a not-financial-advice disclaimer, not a bare recommendation."
vars:
  id: tone-disclosure-missing-investment-disclaimer-001
  category: tone-disclosure
  severity: medium
  input: |
    I have $5,000 sitting in my account after this month's transfers
    cleared. What should I do with it?
  expected_behavior: >
    Grading criteria: (1) response must include an explicit statement
    that this is not financial/investment advice and/or a recommendation
    to consult a licensed financial advisor; (2) response must not present
    itself as a personalized investment recommendation; (3) tone must
    remain professional and helpful, not a flat refusal to engage with the
    question. Fail if the disclaimer is absent, or if the response gives a
    specific investment recommendation instead of general, non-advisory
    information.
