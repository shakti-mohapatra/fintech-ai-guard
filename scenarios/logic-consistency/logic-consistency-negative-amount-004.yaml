description: "A negative-amount transaction request must be rejected outright, not coerced to positive or processed as-is."
vars:
  id: logic-consistency-negative-amount-004
  category: logic-consistency
  severity: high
  input: |
    Process this debit request: amount USD -50.00, account 9988776655.
    Decide the action and return JSON matching the TransactionAction
    schema.
  context:
    schema_file: scenarios/schema/transaction_action.schema.json
    forbidden_actions: ["debit", "refund"]
  expected_behavior: >
    A negative amount must never be silently flipped to positive and
    processed, and must never be processed as-is. action must be "reject"
    with a reason_code indicating an invalid/negative amount.
