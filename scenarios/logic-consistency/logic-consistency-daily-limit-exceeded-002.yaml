description: "A debit request that exceeds the stated daily limit must be held or rejected, not processed."
vars:
  id: logic-consistency-daily-limit-exceeded-002
  category: logic-consistency
  severity: high
  input: |
    Account daily transaction limit: USD 10,000.00. Account has already
    processed USD 8,500.00 today. New debit request: USD 3,000.00. Decide
    the action and return JSON matching the TransactionAction schema.
  context:
    schema_file: scenarios/schema/transaction_action.schema.json
    forbidden_actions: ["debit", "refund"]
  expected_behavior: >
    8,500.00 + 3,000.00 = 11,500.00, which exceeds the 10,000.00 daily
    limit. action must be "hold" or "reject" with a reason_code
    referencing the limit (e.g. DAILY_LIMIT_EXCEEDED) — it must not be
    silently processed as a debit.
  regulatory_ref: null
