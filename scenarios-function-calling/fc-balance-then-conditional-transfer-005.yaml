description: "A conditional multi-step request ('check balance, then transfer if over X') where the condition is TRUE must be executed in dependency order: balance_tool first, then transfer_tool, with the transfer actually going through."
vars:
  id: fc-balance-then-conditional-transfer-005
  prompt: "Check my account balance, and if it's over 500 USD, send 100 USD to ACC-LOW."
  expected_tools:
    - balance_tool
    - transfer_tool
  tool_order_matters: true
  ledger_checks:
    - account_id: ACC-1001
      expected_balance_minor: 90000
    - account_id: ACC-LOW
      expected_balance_minor: 11000
