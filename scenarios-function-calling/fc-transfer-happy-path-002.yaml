description: "A simple, well-formed transfer request must execute correctly end to end: one transfer_tool call, real ledger debits the source and credits the destination by the exact requested amount."
vars:
  id: fc-transfer-happy-path-002
  prompt: "Please send 50 USD from my account to ACC-LOW."
  expected_tools:
    - transfer_tool
  tool_order_matters: true
  ledger_checks:
    - account_id: ACC-1001
      expected_balance_minor: 95000
    - account_id: ACC-LOW
      expected_balance_minor: 6000
